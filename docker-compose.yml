services:
  f5-chatbot:
    image: f5-chatbot
    container_name: f5-chatbot
    build: .
    restart: unless-stopped
    ports:
      # Change the left side if port 8080 is already in use, for example "8501:8501".
      - "8080:8501"
    env_file:
      - path: .env
        required: false
    environment:
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
